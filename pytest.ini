[pytest]
# Pytest configuration file

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output configuration
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=xml

# Marker definitions
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (slower, may have external dependencies)
    build: Build tests (test packaging and build process)
    slow: Slow tests (runtime over 5 seconds)
    requires_browser: Tests requiring browser
    requires_network: Tests requiring network

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage configuration
[coverage:run]
source = src
omit =
    tests/*
    venv/*
    */site-packages/*
    __pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
