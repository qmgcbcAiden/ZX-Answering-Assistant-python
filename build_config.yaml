# ZX Answering Assistant - Build Configuration
# This file controls all aspects of the build process

# Build Mode Configuration
build:
  # Build mode: onedir, onefile, or both
  # onedir: Creates a directory with executable and dependencies (faster startup)
  # onefile: Creates a single standalone executable (slower startup, more portable)
  # both: Builds both onedir and onefile versions
  mode: both

  # Build output directory (relative to project root)
  output_dir: "dist"

  # Clean build directories before building
  clean_before_build: true

# PyInstaller Configuration
pyinstaller:
  # PyInstaller path (auto-download if missing)
  # Set to null to use system PyInstaller or install via pip
  path: null

  # PyInstaller command-line options
  options:
    # Console window: true = show console, false = hide console
    console: true

    # Debug mode: true = include debug information
    debug: false

    # Strip debug information (reduces size)
    strip: true

    # Exclude unnecessary modules
    exclude_modules:
      - tkinter
      - matplotlib
      - numpy
      - pandas

    # Include additional data files
    # Format: ["source_path;destination_path"]
    data_files: []

# UPX Compression Configuration
upx:
  # Enable UPX compression (reduces executable size by 30-50%)
  enabled: false

  # UPX executable path (auto-detect if null)
  # Download from: https://upx.github.io/
  path: null

  # UPX compression level (1-9, higher = better compression but slower)
  compression_level: 9

  # UPX options
  options:
    - "--best"
    - "--lzma"

# Source Code Compilation
compilation:
  # Compile Python source to .pyc bytecode (removes .py files)
  enabled: true

  # Output directory for compiled sources
  output_dir: "src_compiled"

  # Keep __init__.py files (required for package imports)
  keep_init_files: true

  # Optimization level (0, 1, or 2)
  # 0: No optimization
  # 1: Remove assert statements
  # 2: Remove docstrings and assert statements
  optimize: 2

# Playwright Browser Bundling (DEPRECATED - browser downloads on first run)
playwright:
  # Bundle Playwright browser with executable (deprecated, auto-download on first run)
  enabled: false

# Flet Framework Bundling
flet:
  # Bundle Flet desktop executable
  enabled: true

  # Flet version (use current version if null)
  version: null

  # Flet executable download URL
  download_url: "https://github.com/flet-dev/flet/releases/download"

# Application Information
app:
  name: "ZX Answering Assistant"
  # Executable name (without extension)
  exe_name: "ZX-Answering-Assistant"
  # Icon file (optional, must be .ico on Windows)
  icon: null
  # Version information
  version:
    major: 3
    minor: 0
    micro: 0
    build: 0
  # Copyright
  copyright: "Copyright (C) 2024-2026"
  # Company name
  company: "ZX Project"

# Hidden Imports (modules not auto-detected by PyInstaller)
hidden_imports:
  - playwright.sync_api
  - playwright.async_api
  - flet
  - flet.app
  - requests
  - keyboard
  - charset_normalizer
  - certifi
  - urllib3
  - idna
  - greenlet
  - pyee
  - websocket
  - websockets
  # WeBan module dependencies
  - ddddocr
  - loguru
  - Crypto.Cipher
  - Crypto.Util.Padding

# Build Hooks
hooks:
  # Pre-build hooks (run before PyInstaller)
  pre_build:
    - name: "check_dependencies"
      enabled: true
    - name: "install_playwright"
      enabled: true
    - name: "compile_sources"
      enabled: true
    - name: "bundle_browser"
      enabled: true

  # Post-build hooks (run after PyInstaller)
  post_build:
    - name: "cleanup"
      enabled: true

# Logging Configuration
logging:
  # Enable build logging
  enabled: true

  # Log file path
  file: "build.log"

  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # Console output
  console: true
