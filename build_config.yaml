# ZX Answering Assistant - 构建配置文件
# 此文件定义了项目打包时的各种参数和选项

# ============================================
# 构建设置
# ============================================
build:
  # 构建模式: onedir, onefile, both
  mode: both

  # UPX 压缩（减小体积 30-50%，但会稍慢）
  upx: false

  # 源码预编译为 .pyc 字节码
  compile_src: false

  # 预编译后删除源码 .py 文件（仅 onedir 模式）
  remove_source_after_compile: true

  # 增量构建（只重新构建修改过的文件）
  incremental: true

  # 清理旧构建
  clean_before_build: false

  # 构建输出目录
  output_dir: dist

  # 工作目录
  work_dir: build

# ============================================
# Playwright 浏览器配置
# ============================================
playwright:
  # 自动检测浏览器版本
  auto_detect_version: true

  # 后备版本号（自动检测失败时使用）
  fallback_version: "chromium-1200"

  # 是否复制浏览器到项目目录
  copy_browser: true

  # 浏览器路径（相对于项目根目录）
  browsers_path: playwright_browsers

# ============================================
# Flet 可执行文件配置
# ============================================
flet:
  # 下载源: official（官方 GitHub）, mirror（镜像）
  download_source: official

  # Flet 版本号
  version: "0.80.2"

  # 验证下载的文件大小（50-300 MB）
  verify_size: true

  # 最小文件大小 (MB)
  min_size: 50

  # 最大文件大小 (MB)
  max_size: 300

# ============================================
# 交付物配置
# ============================================
artifacts:
  # 生成校验和文件
  generate_checksums: true

  # 校验和算法: SHA256, SHA512, MD5
  checksum_algorithm: SHA256

  # 生成构建报告
  generate_report: true

  # 报告格式: json, html
  report_format: json

# ============================================
# 日志配置
# ============================================
logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: INFO

  # 日志目录
  log_dir: logs

  # 同时输出到控制台
  console_output: true

  # 详细模式（显示更多调试信息）
  verbose: false

  # 保存日志天数（用于自动清理）
  retention_days: 30

# ============================================
# 验证配置
# ============================================
validation:
  # 构建后验证产物
  validate_after_build: true

  # 检查磁盘空间（需要的最小空间 GB）
  min_disk_space: 2

  # 验证依赖完整性
  verify_dependencies: true

# ============================================
# 代码签名（仅 Windows）
# ============================================
signing:
  # 是否启用代码签名
  enabled: false

  # 证书文件路径（.pfx 文件）
  cert_path: null

  # 时间戳服务器 URL
  timestamp_url: "http://timestamp.digicert.com"

  # 签名算法: sha1, sha256, sha384, sha512
  algorithm: sha256

# ============================================
# 性能优化
# ============================================
performance:
  # 并行构建（同时构建 onedir 和 onefile）
  parallel_build: true

  # 依赖缓存（缓存下载的文件）
  enable_cache: true

  # 缓存目录
  cache_dir: .build_cache

  # 缓存有效期（天）
  cache_ttl: 30

# ============================================
# 开发环境配置
# ============================================
development:
  # 快速模式（跳过某些步骤以加快开发构建）
  fast_mode: false

  # 跳过浏览器复制
  skip_browser_copy: false

  # 跳过 Flet 下载
  skip_flet_download: false

  # 使用较少的优化（加快构建）
  less_optimization: false
