name: Build and Release

on:
  push:
    branches: [ main, dev ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ============================================
  # 测试任务
  # ============================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ============================================
  # 构建 Windows 版本
  # ============================================
  build-windows:
    name: Build Windows
    needs: test
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium

      - name: Build project
        run: python build.py --mode both --compile-src

      - name: Generate checksums
        run: |
          cd dist
          for file in *.exe; do
            if [ -f "$file" ]; then
              certutil -hashfile "$file" SHA256 > "$file.SHA256"
            fi
          done
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: windows-build
          path: dist/**

  # ============================================
  # 创建 GitHub Release
  # ============================================
  release:
    name: Create Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: windows-build
          path: dist

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: ZX Answering Assistant v${{ steps.version.outputs.version }}
          body: |
            ## ZX Answering Assistant ${{ steps.version.outputs.version }}

            ### 📦 下载说明

            - **installer**: 目录模式，启动快，推荐使用
            - **portable**: 单文件模式，所有文件打包到一个可执行文件

            ### 🔑 系统要求

            - Windows 10/11 x64
            - 依赖包已内置，无需额外安装

            ### 📝 更新日志

            请查看 [CHANGELOG.md](https://github.com/your-org/your-repo/blob/main/CHANGELOG.md)

          files: dist/**
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
