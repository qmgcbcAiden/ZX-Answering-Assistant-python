name: Build Desktop Releases

on:
  push:
    branches:
      - main
    paths:
      - version.py
  workflow_dispatch:

permissions:
  contents: read

env:
  FLET_CLI_NO_RICH_OUTPUT: "1"
  NO_COLOR: "1"
  PYTHONIOENCODING: utf-8
  PYTHONUTF8: "1"
  WEBAN_REPOSITORY: https://github.com/hangone/WeBan.git
  WEBAN_REF: ${{ vars.WEBAN_REF || 'ad149ce507be66d909d908bad7905a1029636a46' }}

jobs:
  metadata:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.metadata.outputs.app_version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      release_name: ${{ steps.metadata.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read app version
        id: metadata
        shell: bash
        run: |
          APP_VERSION="$(
            python - <<'PY'
          import pathlib
          import re

          version_py = pathlib.Path("version.py").read_text(encoding="utf-8")
          match = re.search(r'^VERSION\s*=\s*["\']([^"\']+)["\']', version_py, re.MULTILINE)

          if not match:
              pyproject = pathlib.Path("pyproject.toml").read_text(encoding="utf-8")
              match = re.search(r'^version\s*=\s*["\']([^"\']+)["\']', pyproject, re.MULTILINE)

          print(match.group(1) if match else "0.0.0")
          PY
          )"

          RELEASE_TAG="v${APP_VERSION}"

          {
            echo "app_version=${APP_VERSION}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=ZX Answering Assistant ${RELEASE_TAG}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.name }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86-64
            runner: windows-latest
            platform: windows-x86_64
          - name: macOS x86-64
            runner: macos-26-intel
            platform: macos-x86_64
          - name: macOS arm64
            runner: macos-26
            platform: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install -r plugins/weban_plugin/requirements.txt
          flet --version

      - name: Show build toolchain
        shell: bash
        run: |
          echo "Runner OS: ${RUNNER_OS}"
          echo "Runner arch: ${RUNNER_ARCH}"
          python --version

          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            uname -m
            sw_vers
            xcodebuild -version
          fi

          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            echo "PROCESSOR_ARCHITECTURE=${PROCESSOR_ARCHITECTURE:-unknown}"
            echo "PROCESSOR_ARCHITEW6432=${PROCESSOR_ARCHITEW6432:-unknown}"
          fi

      - name: Cache WeBan module
        uses: actions/cache@v4
        with:
          path: plugins/weban_plugin/modules/WeBan
          key: weban-module-${{ matrix.platform }}-${{ env.WEBAN_REF }}-${{ hashFiles('plugins/weban_plugin/manifest.json', 'plugins/weban_plugin/requirements.txt') }}
          restore-keys: |
            weban-module-${{ matrix.platform }}-${{ env.WEBAN_REF }}-

      - name: Download WeBan module
        shell: bash
        run: |
          set -euo pipefail

          target_dir="plugins/weban_plugin/modules/WeBan"
          mkdir -p "$(dirname "${target_dir}")"

          if [[ -d "${target_dir}/.git" ]]; then
            echo "Using cached WeBan module at ${target_dir}"
            git -C "${target_dir}" remote set-url origin "${WEBAN_REPOSITORY}"
          else
            echo "Cloning WeBan module from ${WEBAN_REPOSITORY}"
            rm -rf "${target_dir}"
            git clone --filter=blob:none --no-checkout "${WEBAN_REPOSITORY}" "${target_dir}"
          fi

          echo "Fetching WeBan ref: ${WEBAN_REF}"
          if git -C "${target_dir}" fetch --depth 1 origin "${WEBAN_REF}"; then
            git -C "${target_dir}" checkout --force FETCH_HEAD
          else
            echo "Direct fetch failed; fetching branch and tag heads before checkout."
            git -C "${target_dir}" fetch --depth 1 origin '+refs/heads/*:refs/remotes/origin/*' '+refs/tags/*:refs/tags/*'
            git -C "${target_dir}" checkout --force "${WEBAN_REF}"
          fi
          git -C "${target_dir}" clean -fdx

          resolved_ref="$(git -C "${target_dir}" rev-parse HEAD)"
          echo "WEBAN_RESOLVED_REF=${resolved_ref}" >> "${GITHUB_ENV}"
          echo "WeBan resolved commit: ${resolved_ref}"

          test -f "${target_dir}/main.py"
          test -f "${target_dir}/api.py"

      - name: Build Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          chcp 65001
          [Console]::OutputEncoding = [System.Text.UTF8Encoding]::new()
          $OutputEncoding = [System.Text.UTF8Encoding]::new()
          flet build windows --project=ZX-Answering-Assistant --verbose --yes --no-rich-output

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null

          $appExe = Get-ChildItem -Path build/windows -File -Recurse -Filter "*.exe" |
            Where-Object { $_.Name -like "*Answering*" -or $_.Name -like "*ZX*" } |
            Select-Object -First 1

          if (-not $appExe) {
            Write-Host "No matching app executable found. Available executables:"
            Get-ChildItem -Path build/windows -File -Recurse -Filter "*.exe" |
              Select-Object FullName, Length |
              Format-Table -AutoSize

            throw "Could not find the Windows app executable under build/windows."
          }

          $releaseDir = $appExe.Directory
          Write-Host "Packaging Windows app from $($releaseDir.FullName)"

          $archive = "release-assets/ZX-Answering-Assistant-${{ needs.metadata.outputs.app_version }}-${{ matrix.platform }}.zip"
          Compress-Archive -Path "$($releaseDir.FullName)/*" -DestinationPath $archive -Force
          Get-ChildItem release-assets

      - name: Build macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          flet build macos --project=ZX-Answering-Assistant --verbose --yes --no-rich-output

      - name: Package macOS app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-assets

          app_path="$(find build/macos -maxdepth 8 -type d -name '*.app' | head -n 1)"
          if [[ -z "${app_path}" ]]; then
            echo "Could not find macOS .app bundle under build/macos." >&2
            exit 1
          fi

          archive="release-assets/ZX-Answering-Assistant-${{ needs.metadata.outputs.app_version }}-${{ matrix.platform }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "${app_path}" "${archive}"
          ls -lh release-assets

      - name: Upload packaged app
        uses: actions/upload-artifact@v7
        with:
          name: ZX-Answering-Assistant-${{ matrix.platform }}
          path: release-assets/*.zip
          if-no-files-found: error
          archive: false

  release:
    name: Publish GitHub Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download packaged apps
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: ZX-Answering-Assistant-*
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.metadata.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.metadata.outputs.release_name }}
          TARGET_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(release-assets/*.zip)
          if (( ${#assets[@]} == 0 )); then
            echo "No release assets found under release-assets/." >&2
            exit 1
          fi

          release_notes="Automated desktop build from main branch commit ${TARGET_SHA}."

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${assets[@]}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${assets[@]}" \
              --title "${RELEASE_NAME}" \
              --notes "${release_notes}" \
              --target "${TARGET_SHA}" \
              --latest
          fi
